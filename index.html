<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT융합대학 특강 마일리지 조회</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem; }
    .wrap { width: 100%; max-width: 480px; }
    .logo { font-size: 11px; color: #aaa; margin-bottom: 1.5rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .title { font-size: 24px; font-weight: 600; color: #111; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #888; margin-bottom: 2rem; line-height: 1.7; }
    .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.75rem; }
    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .field input { width: 100%; padding: 11px 14px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fafafa; color: #111; outline: none; font-family: inherit; transition: border-color 0.15s; }
    .field input:focus { border-color: #999; background: #fff; }
    .btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; background: #111; color: #fff; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; margin-top: 4px; }
    .btn:hover { background: #333; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 10px; display: none; }
    .loading-msg { font-size: 13px; color: #888; margin-top: 10px; display: none; text-align: center; }
    .result { margin-top: 1.5rem; display: none; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.25rem 0; }
    .profile { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .avatar { width: 46px; height: 46px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .profile-info p { font-size: 16px; font-weight: 600; color: #111; }
    .profile-info span { font-size: 13px; color: #888; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .stat { background: #f7f7f5; border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #111; }
    .stat-value span { font-size: 13px; font-weight: 400; color: #888; margin-left: 2px; }
    .section-title { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
    .lecture-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #f0f0f0; }
    .lecture-item:last-child { border-bottom: none; }
    .lecture-name { font-size: 14px; color: #111; font-weight: 500; }
    .lecture-date { font-size: 12px; color: #aaa; margin-top: 2px; }
    .lecture-point { font-size: 14px; font-weight: 600; color: #2d7a4f; }
    .empty-msg { font-size: 14px; color: #aaa; text-align: center; padding: 1rem 0; }
    .hint { font-size: 12px; color: #bbb; text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="logo">특강 마일리지 시스템</p>
    <p class="title">마일리지 조회</p>
    <p class="sub">학번과 이름을 입력하면<br>누적 마일리지와 참석 내역을 확인할 수 있어요.</p>

    <div class="card">
      <div class="field">
        <label>학번</label>
        <input type="text" id="inp-id" placeholder="20261234" maxlength="10" inputmode="numeric" />
      </div>
      <div class="field">
        <label>이름</label>
        <input type="text" id="inp-name" placeholder="김수정" maxlength="10" />
      </div>
      <p class="error-msg" id="error-msg"></p>
      <p class="loading-msg" id="loading-msg">조회 중...</p>
      <button class="btn" id="btn" onclick="check()">조회하기</button>

      <div class="result" id="result">
        <div class="divider"></div>
        <div class="profile">
          <div class="avatar" id="r-avatar"></div>
          <div class="profile-info">
            <p id="r-name"></p>
            <span id="r-dept"></span>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <p class="stat-label">총 참석횟수</p>
            <p class="stat-value"><span id="r-count"></span><span>회</span></p>
          </div>
          <div class="stat">
            <p class="stat-label">누적 마일리지</p>
            <p class="stat-value"><span id="r-mile"></span><span>점</span></p>
          </div>
        </div>
        <div class="divider"></div>
        <p class="section-title">참석 내역</p>
        <div id="r-list"></div>
      </div>
    </div>
    <p class="hint">문의사항은 담당자에게 연락해 주세요<br>문의처 : cseri@sungshin.ac.kr</p>
  </div>

  <script>
    // ✅ 여기에 본인의 Apps Script URL을 붙여넣으세요
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYGCnIY6gBz4wdLP9Bu7_7I3HKWRlPQM2NsNFuZ7eG2qoMKsmoZ84QWemvbNs9gLUj/exec";

    async function check() {
      const id = document.getElementById("inp-id").value.trim();
      const name = document.getElementById("inp-name").value.trim();
      const errEl = document.getElementById("error-msg");
      const loadEl = document.getElementById("loading-msg");
      const resEl = document.getElementById("result");
      const btn = document.getElementById("btn");

      errEl.style.display = "none";
      resEl.style.display = "none";
      loadEl.style.display = "none";

      if (!id || !name) {
        errEl.textContent = "학번과 이름을 모두 입력해 주세요.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      loadEl.style.display = "block";

      try {
        const res = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`);
        const data = await res.json();

        if (!data || data.count === undefined) {
          errEl.textContent = "입력한 정보와 일치하는 학생을 찾을 수 없어요.";
          errEl.style.display = "block";
          loadEl.style.display = "none";
          btn.disabled = false;
          return;
        }

        document.getElementById("r-avatar").textContent = data.name.slice(0, 1);
        document.getElementById("r-name").textContent = data.name;
        document.getElementById("r-dept").textContent = data.dept || "";
        document.getElementById("r-count").textContent = data.count;
        document.getElementById("r-mile").textContent = data.mileage;

        const list = document.getElementById("r-list");
        if (data.lectures && data.lectures.length > 0) {
          list.innerHTML = data.lectures.map(l => `
            <div class="lecture-item">
              <div>
                <p class="lecture-name">${l.lecture}</p>
                <p class="lecture-date">${l.date}</p>
              </div>
              <p class="lecture-point">+50점</p>
            </div>
          `).join("");
        } else {
          list.innerHTML = `<p class="empty-msg">참석 내역이 없어요.</p>`;
        }

        resEl.style.display = "block";
      } catch (err) {
        errEl.textContent = "조회 중 오류가 발생했어요. 잠시 후 다시 시도해 주세요.";
        errEl.style.display = "block";
      }

      loadEl.style.display = "none";
      btn.disabled = false;
    }

    document.getElementById("inp-name").addEventListener("keydown", e => { if (e.key === "Enter") check(); });
    document.getElementById("inp-id").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("inp-name").focus(); });
  </script>
</body>
</html>
